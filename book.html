<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request a Consultation — Moroccan Travel Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&family=Raleway:wght@200;300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ─── CSS Variables ────────────────────────────────────── */
      :root {
        --red: #c8102e;
        --green: #006233;
        --dark: #1a1a1a;
        --mid: #444444;
        --light: #f5f2ee;
        --white: #ffffff;
        --gold: #b89a5e;

        --border-subtle: rgba(184, 154, 94, 0.22);
        --border-focus: rgba(184, 154, 94, 0.75);
        --ink: rgba(245, 242, 238, 0.82);
        --ink-dim: rgba(245, 242, 238, 0.38);
        --surface: rgba(255, 255, 255, 0.03);

        --ease-silk: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      /* ─── Reset & Base ─────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: var(--dark);
        color: var(--ink);
        font-family: "Josefin Sans", "Raleway", sans-serif;
        font-weight: 300;
        letter-spacing: 0.04em;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* ─── Noise Texture Overlay ────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.032;
        pointer-events: none;
        z-index: 0;
      }

      /* ─── HEADER / NAV placeholder ─────────────────────────── */
      <!-- HEADER / NAV GOES HERE -->

    /* ─── Hero ─────────────────────────────────────────────── */
    .hero {
        position: relative;
        min-height: 52vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 6rem 2rem 4rem;
        overflow: hidden;
        z-index: 1;
      }

      /* Radial glow — deep emerald bleed */
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 50% 110%,
            rgba(0, 98, 51, 0.28) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 40% at 50% -10%,
            rgba(184, 154, 94, 0.12) 0%,
            transparent 65%
          );
        pointer-events: none;
      }

      /* Thin gold rule above heading */
      .hero-rule {
        display: block;
        width: 48px;
        height: 1px;
        background: var(--gold);
        margin: 0 auto 2.2rem;
        opacity: 0;
        animation: fadeUp 0.9s var(--ease-silk) 0.2s forwards;
      }

      .hero-label {
        font-family: "Josefin Sans", sans-serif;
        font-weight: 200;
        font-size: 0.68rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 1.1rem;
        opacity: 0;
        animation: fadeUp 0.9s var(--ease-silk) 0.35s forwards;
      }

      .hero-heading {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(2.8rem, 6.5vw, 5.2rem);
        line-height: 1.08;
        letter-spacing: -0.01em;
        color: var(--light);
        opacity: 0;
        animation: fadeUp 1s var(--ease-silk) 0.5s forwards;
      }

      .hero-heading em {
        font-style: italic;
        color: var(--gold);
      }

      .hero-sub {
        font-family: "Raleway", sans-serif;
        font-weight: 200;
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-top: 1.6rem;
        max-width: 34ch;
        line-height: 1.9;
        opacity: 0;
        animation: fadeUp 0.9s var(--ease-silk) 0.7s forwards;
      }

      /* Decorative zellige-inspired arc at bottom of hero */
      .hero-arc {
        position: absolute;
        bottom: -1px;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        overflow: hidden;
        line-height: 0;
      }
      .hero-arc svg {
        display: block;
        width: 100%;
      }

      /* ─── Form Section ──────────────────────────────────────── */
      .consult-section {
        position: relative;
        z-index: 1;
        padding: 5rem 1.5rem 8rem;
      }

      .form-container {
        max-width: 680px;
        margin: 0 auto;
        opacity: 0;
        animation: fadeUp 1s var(--ease-silk) 0.9s forwards;
      }

      /* Ornamental divider */
      .ornament {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 3.2rem;
      }
      .ornament-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--border-subtle)
        );
      }
      .ornament-line:first-child {
        background: linear-gradient(to left, transparent, var(--border-subtle));
      }
      .ornament-diamond {
        width: 6px;
        height: 6px;
        background: var(--gold);
        transform: rotate(45deg);
        opacity: 0.7;
        flex-shrink: 0;
      }

      /* ─── Form ──────────────────────────────────────────────── */
      .booking-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.6rem 1.8rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }
      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-family: "Josefin Sans", sans-serif;
        font-weight: 200;
        font-size: 0.62rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
      }

      input,
      textarea,
      select {
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: 0;
        color: var(--light);
        font-family: "Raleway", sans-serif;
        font-weight: 300;
        font-size: 0.84rem;
        letter-spacing: 0.06em;
        padding: 0.85rem 1rem;
        width: 100%;
        outline: none;
        transition:
          border-color 0.35s var(--ease-silk),
          background 0.35s var(--ease-silk),
          box-shadow 0.35s var(--ease-silk);
        -webkit-appearance: none;
        appearance: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--ink-dim);
        font-weight: 200;
        letter-spacing: 0.05em;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--border-focus);
        background: rgba(184, 154, 94, 0.04);
        box-shadow:
          0 0 0 1px rgba(184, 154, 94, 0.15),
          0 4px 24px rgba(0, 0, 0, 0.35);
      }

      /* Date input calendar icon fix */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.55) sepia(1) saturate(0.6) hue-rotate(5deg)
          brightness(1.1);
        cursor: pointer;
        opacity: 0.55;
      }

      /* Custom select arrow */
      .select-wrap {
        position: relative;
      }
      .select-wrap::after {
        content: "";
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%) rotate(45deg);
        width: 6px;
        height: 6px;
        border-right: 1px solid var(--gold);
        border-bottom: 1px solid var(--gold);
        pointer-events: none;
        opacity: 0.7;
      }
      select {
        background-image: none;
        cursor: pointer;
      }
      select option {
        background: #1e1e1e;
        color: var(--light);
      }

      textarea {
        resize: none;
        min-height: 140px;
        line-height: 1.75;
      }

      /* ─── Date Range Row ─────────────────────────────────────── */
      .date-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      /* ─── Submit Button ──────────────────────────────────────── */
      .submit-wrap {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
        margin-top: 0.6rem;
      }

      .submit-note {
        font-family: "Josefin Sans", sans-serif;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--ink-dim);
        line-height: 1.7;
        max-width: 24ch;
      }

      .btn-submit {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0.85rem;
        background: var(--green);
        border: 1px solid transparent;
        color: var(--white);
        font-family: "Josefin Sans", sans-serif;
        font-weight: 300;
        font-size: 0.65rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        padding: 1.05rem 2.2rem;
        cursor: pointer;
        overflow: hidden;
        transition:
          background 0.4s var(--ease-silk),
          border-color 0.4s var(--ease-silk),
          color 0.4s var(--ease-silk),
          transform 0.25s var(--ease-silk),
          box-shadow 0.4s var(--ease-silk);
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* Shimmer sweep on hover */
      .btn-submit::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.12),
          transparent
        );
        transform: skewX(-18deg);
        transition: left 0.55s var(--ease-silk);
      }

      .btn-submit:hover {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--dark);
        box-shadow: 0 8px 32px rgba(184, 154, 94, 0.28);
        transform: translateY(-1px);
      }

      .btn-submit:hover::before {
        left: 140%;
      }

      .btn-submit:active {
        transform: translateY(0);
      }

      /* Arrow icon */
      .btn-arrow {
        display: inline-block;
        width: 14px;
        height: 1px;
        background: currentColor;
        position: relative;
        transition: width 0.3s var(--ease-silk);
      }
      .btn-arrow::after {
        content: "";
        position: absolute;
        right: 0;
        top: -3px;
        width: 7px;
        height: 7px;
        border-right: 1px solid currentColor;
        border-top: 1px solid currentColor;
        transform: rotate(45deg);
      }
      .btn-submit:hover .btn-arrow {
        width: 20px;
      }

      /* ─── Footer Strip ───────────────────────────────────────── */
      .page-footer {
        position: relative;
        z-index: 1;
        border-top: 1px solid var(--border-subtle);
        padding: 2rem 3rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .footer-brand {
        font-family: "Cormorant Garamond", serif;
        font-size: 0.95rem;
        font-weight: 400;
        letter-spacing: 0.15em;
        color: var(--ink-dim);
      }
      .footer-copy {
        font-family: "Josefin Sans", sans-serif;
        font-size: 0.58rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-dim);
      }

      /* ─── Keyframes ──────────────────────────────────────────── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ─── Responsive ─────────────────────────────────────────── */
      @media (max-width: 600px) {
        .booking-form {
          grid-template-columns: 1fr;
        }
        .field.full {
          grid-column: 1;
        }
        .submit-wrap {
          flex-direction: column;
          align-items: stretch;
        }
        .btn-submit {
          justify-content: center;
        }
        .submit-note {
          text-align: center;
          max-width: 100%;
        }
        .date-row {
          grid-template-columns: 1fr;
        }
        .page-footer {
          flex-direction: column;
          gap: 0.5rem;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER / NAV GOES HERE -->

    <!-- ╔══════════════════════════════════════╗ -->
    <!-- ║              HERO                    ║ -->
    <!-- ╚══════════════════════════════════════╝ -->
    <section class="hero" aria-label="Page hero">
      <span class="hero-rule"></span>
      <p class="hero-label">Private Client Services</p>
      <h1 class="hero-heading">Request a <em>Consultation</em></h1>
      <p class="hero-sub">
        Every journey begins with a single conversation. Tell us your vision.
      </p>

      <!-- Subtle curved transition to form section -->
      <div class="hero-arc" aria-hidden="true">
        <svg
          viewBox="0 0 1440 40"
          preserveAspectRatio="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M0,0 C360,40 1080,40 1440,0 L1440,40 L0,40 Z"
            fill="#1a1a1a"
            opacity="0.7"
          />
        </svg>
      </div>
    </section>

    <!-- ╔══════════════════════════════════════╗ -->
    <!-- ║         CONSULTATION FORM            ║ -->
    <!-- ╚══════════════════════════════════════╝ -->
    <section class="consult-section" aria-label="Consultation form">
      <div class="form-container">
        <div class="ornament" aria-hidden="true">
          <div class="ornament-line"></div>
          <div class="ornament-diamond"></div>
          <div class="ornament-line"></div>
        </div>

        <form class="booking-form" novalidate>
          <!-- Name -->
          <div class="field">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your full name"
              autocomplete="name"
              required
            />
          </div>

          <!-- Email -->
          <div class="field">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <!-- Travel Dates -->
          <div class="field full">
            <label>Desired Travel Dates</label>
            <div class="date-row">
              <input
                type="date"
                id="date-from"
                name="date_from"
                aria-label="Departure date"
              />
              <input
                type="date"
                id="date-to"
                name="date_to"
                aria-label="Return date"
              />
            </div>
          </div>

          <!-- Number of Guests -->
          <div class="field">
            <label for="guests">Number of Guests</label>
            <div class="select-wrap">
              <select id="guests" name="guests">
                <option value="" disabled selected>Select guests</option>
                <option value="1">1 Guest — Solo</option>
                <option value="2">2 Guests — Couple</option>
                <option value="3-4">3–4 Guests — Small Group</option>
                <option value="5-8">5–8 Guests — Private Group</option>
                <option value="9+">9+ Guests — Exclusive Party</option>
              </select>
            </div>
          </div>

          <!-- Phone (optional) -->
          <div class="field">
            <label for="phone"
              >Phone
              <span
                style="opacity: 0.4; font-size: 0.55rem; letter-spacing: 0.1em"
                >&nbsp;Optional</span
              ></label
            >
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="+1 (000) 000-0000"
              autocomplete="tel"
            />
          </div>

          <!-- Vision Textarea -->
          <div class="field full">
            <label for="vision">Tell Us About Your Vision</label>
            <textarea
              id="vision"
              name="vision"
              placeholder="Describe your ideal Moroccan journey — the atmosphere, the pace, the moments you seek. Nothing is too ambitious."
              rows="6"
            ></textarea>
          </div>

          <!-- Submit -->
          <div class="submit-wrap">
            <p class="submit-note">
              We respond within 24 hours.<br />All enquiries are strictly
              confidential.
            </p>
            <button type="submit" class="btn-submit">
              Submit Enquiry
              <span class="btn-arrow" aria-hidden="true"></span>
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- ─── Footer Strip ─────────────────────────────────────── -->
    <footer class="page-footer">
      <span class="footer-brand">Moroccan Travel Agency</span>
      <span class="footer-copy"
        >&copy; 2025 &nbsp;·&nbsp; All rights reserved</span
      >
    </footer>
  </body>
</html>
